name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt pytest httpx
      - run: PYTHONPATH=. pytest -v --tb=short
        env:
          DATABASE_URL: sqlite:///./test.db
          DATABASE_URL_SYNC: sqlite:///./test.db
          LOG_LEVEL: WARNING
          REDIS_URL: ""
          WHATSAPP_GATEWAY_URL: http://localhost:3000

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build api

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: stockdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d stockdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. pytest -v --tb=short -k "test_health or test_list_brokers or test_switch_broker or test_broker_status"
        env:
          DATABASE_URL_SYNC: postgresql://user:pass@localhost:5432/stockdb
          LOG_LEVEL: WARNING
          WHATSAPP_GATEWAY_URL: http://localhost:3000
